    Export:
      Name: !Sub "${AWS::StackName}-S3BucketArn"

  TransactionsLedgerTableArn:
    Description: "ARN of the Transactions-Ledger DynamoDB table"
    Value: !GetAtt DynamoDBTableTransactionsLedger.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TransactionsLedgerArn"

  PendingReviewsTableArn:
