    Type: AWS::Lambda::Permission
    DeletionPolicy: Retain
    Properties:
      FunctionName: !GetAtt LambdaFunctionAMLWebSocketStreamTrail.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApiId}/*/$connect"

  LambdaPermissionWebSocketDisconnect:
    UpdateReplacePolicy: Retain
    Type: AWS::Lambda::Permission
    DeletionPolicy: Retain
    Properties:
      FunctionName: !GetAtt LambdaFunctionAMLWebSocketStreamTrail.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApiId}/*/\$disconnect"

  LambdaPermissionWebSocketStartTrace:
    UpdateReplacePolicy: Retain
    Type: AWS::Lambda::Permission
    DeletionPolicy: Retain
    Properties:
      FunctionName: !GetAtt LambdaFunctionAMLWebSocketStreamTrail.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApiId}/*/startTrace"

  LambdaPermissionGetPendingCases:
    UpdateReplacePolicy: Retain
    Type: AWS::Lambda::Permission
    DeletionPolicy: Retain
    Properties:
      FunctionName: !GetAtt LambdaFunctionAMLGetPendingCases.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApiId}/*/*/cases"

  LambdaPermissionCaseResolver:
    UpdateReplacePolicy: Retain
    Type: AWS::Lambda::Permission
    DeletionPolicy: Retain
    Properties:
      FunctionName: !GetAtt LambdaFunctionAMLCaseResolver.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApiId}/*/*/resolve"

  # ════════════════════════════════════════════════════════════════════════════
  # Step Functions — AML Risk Escalator
  # ════════════════════════════════════════════════════════════════════════════
  StepFunctionsStateMachineAMLRiskEscalator:
    UpdateReplacePolicy: Retain
    Type: AWS::StepFunctions::StateMachine
    DeletionPolicy: Retain
    Properties:
      StateMachineName: "AML-Risk-Escalator"
      StateMachineType: STANDARD
      RoleArn: !GetAtt IAMRoleStepFunctionsAMLRiskEscalator.Arn
      EncryptionConfiguration:
        Type: AWS_OWNED_KEY
      LoggingConfiguration:
        IncludeExecutionData: false
        Level: "OFF"
      TracingConfiguration:
        Enabled: false
      # All ARNs reference stack resources via !Sub / Fn::Sub
      DefinitionSubstitutions:
        RiskScorerArn: !GetAtt LambdaFunctionAMLRiskScorer.Arn
        SNSTopicArn: !Ref SNSTopicAMLReviewAlerts
        PendingReviewsTable: !Ref DynamoDBTableAMLPendingReviews
      Definition:
        StartAt: "Call Risk Scorer"
        States:
          "Call Risk Scorer":
            Type: Task
            Resource: "arn:aws:states:::lambda:invoke"
            Parameters:
              FunctionName.$: "States.Format('{}', '${RiskScorerArn}')"
              Payload:
                "transaction.$": "$.transaction"
            Next: "Evaluate Risk"
            ResultPath: "$.lambda_output"
          "Evaluate Risk":
            Type: Choice
            Choices:
              - Variable: "$.lambda_output.Payload.risk_score"
                NumericGreaterThanEquals: 0.5
                Next: "Notify Escalation via SNS"
            Default: "Transaction Completed"
          "Notify Escalation via SNS":
            Type: Task
            Resource: "arn:aws:states:::sns:publish"
            Parameters:
              TopicArn: "${SNSTopicArn}"
              "Message.$": "States.JsonToString(States.Format('CRITICAL: Transaction {} requires manual compliance review. Check the Next.js dashboard.', $.transaction.id))"
            ResultPath: null
            Next: "Save Escalation and Pause"
          "Save Escalation and Pause":
            Type: Task
            Resource: "arn:aws:states:::aws-sdk:dynamodb:putItem.waitForTaskToken"
            Parameters:
              TableName: "${PendingReviewsTable}"
              Item:
                TransactionID:
                  "S.$": "$.transaction.id"
                Amount:
                  "N.$": "States.Format('{}', $.transaction.amount)"
                Currency:
                  "S.$": "$.transaction.currency"
                OriginCountry:
                  "S.$": "$.transaction.origin_country"
                DestCountry:
                  "S.$": "$.transaction.dest_country"
                RiskScore:
                  "N.$": "States.Format('{}', $.lambda_output.Payload.risk_score)"
                Reasoning:
                  "S.$": "$.lambda_output.Payload.reasoning"
                Status:
                  S: "PENDING_HUMAN_REVIEW"
                TaskToken:
                  "S.$": "$$.Task.Token"
            ResultPath: "$.human_review_result"
            Next: "Notify Resolution via SNS"
          "Notify Resolution via SNS":
            Type: Task
            Resource: "arn:aws:states:::sns:publish"
            Parameters:
              TopicArn: "${SNSTopicArn}"
              "Message.$": "States.JsonToString(States.Format('RESOLVED: Case for Transaction {} has been closed.', $.transaction.id))"
            Next: "Transaction Completed"
          "Transaction Completed":
            Type: Pass
            Result: "Transaction Cleared"
            End: true

  # ════════════════════════════════════════════════════════════════════════════
  # RAM Permissions (Lake Formation / Glue sharing — account-agnostic)
  # ════════════════════════════════════════════════════════════════════════════

  RAMPermissionGlueDatabaseReadWriteForTable:
    UpdateReplacePolicy: Retain
    Type: AWS::RAM::Permission
    DeletionPolicy: Retain
    Properties:
      Name: "AWSRAMLFEnabledGlueDatabaseReadWriteForTable"
      ResourceType: "glue:Table"
      PolicyTemplate:
        Condition:
          StringEquals:
            "glue:LakeFormationPermissions": "Enabled"
        Action:
          - glue:GetTable
          - glue:UpdateTable
          - glue:DeleteTable
          - glue:BatchDeleteTable
          - glue:BatchDeleteTableVersion
          - glue:GetTableVersion
          - glue:GetTableVersions
          - glue:GetPartition
          - glue:GetPartitions
          - glue:BatchGetPartition
          - glue:BatchCreatePartition
          - glue:CreatePartition
          - glue:UpdatePartition
          - glue:BatchDeletePartition
          - glue:DeletePartition
          - glue:GetTables
          - glue:SearchTables
          - glue:CreateTable
          - glue:DeleteDatabase
          - glue:BatchUpdatePartition
          - glue:DeleteTableVersion
        Effect: Allow

  RAMPermissionGlueAllTablesReadWriteForDatabase:
    UpdateReplacePolicy: Retain
    Type: AWS::RAM::Permission
    DeletionPolicy: Retain
    Properties:
      Name: "AWSRAMLFEnabledGlueAllTablesReadWriteForDatabase"
      ResourceType: "glue:Database"
      PolicyTemplate:
        Condition:
          StringEquals:
            "glue:LakeFormationPermissions": "Enabled"
        Action:
          - glue:GetTable
          - glue:UpdateTable
          - glue:DeleteTable
          - glue:BatchDeleteTable
          - glue:BatchDeleteTableVersion
          - glue:GetTableVersion
          - glue:GetTableVersions
          - glue:GetPartition
          - glue:GetPartitions
          - glue:BatchGetPartition
          - glue:BatchCreatePartition
          - glue:CreatePartition
          - glue:UpdatePartition
          - glue:BatchDeletePartition
          - glue:DeletePartition
          - glue:GetTables
          - glue:GetDatabase
          - glue:GetDatabases
          - glue:SearchTables
          - glue:BatchUpdatePartition
          - glue:DeleteTableVersion
          - glue:GetUserDefinedFunctions
        Effect: Allow

