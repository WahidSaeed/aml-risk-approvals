name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"] # Triggers whenever code is pushed to your master/main branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile and Export Static Site Bundle
        run: npm run build

      - name: Upload Build Artifacts to GitHub Pages Storage
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # This uploads the clean 'out' directory Next.js generated

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publish to Live GitHub Pages Site
        id: deployment
        uses: actions/deploy-pages@v4
